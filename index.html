<!DOCTYPE html>

<html>

<head>
    <title>Node 서버</title>
</head>


<body>
    <div class="text">서버에서 보낸 메세지 :</div>
    <div class="chat-box">

    </div>

    <p>
        Node.js가 HTML 파일을 보내고 있습니다.
    </p>

</body>
<script>
    fetch("http://localhost:3000")

    .then(res => res.json())
    .then(messagesArray => {
        const $chatBox = document.querySelector('.chat-box');
        messagesArray.forEach(element => {
            const $message = document.createElement('p');
            $message.textContent = element.name + " : " + element.message;
            $chatBox.appendChild($message);
        });
    });
</script>

</html>
