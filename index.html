<!DOCTYPE html>
<html>
<head>
    
</head>
<body>
    <h1>내 첫 번째 서버 페이지</h1>
    
    <p>
        Node.js가 HTML을 보내고 있습니다.
    </p>
    <button id="button">서버에 요청</button>
    <p id="result"></p>
</body>
<script>
    const $btn = document.querySelector("#button");
    const $result = document.querySelector("#result");

    const url = "https://practice-server-adky.onrender.com/"

    $btn.addEventListener("click", ()=>{
        fetch(url + "message")
        .then(response => response.text())
        .then(text =>{
            $result.textContent = text;
        });
    });


</script>
</html>
