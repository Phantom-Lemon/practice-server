<!DOCTYPE html>

<html>

<head>
    <title>Node 서버</title>
</head>


<body>
    <h1>채팅</h1>
    <input id="input">
    <button id="button">보내기</button>

    <div class="chat-box">

    </div>

    <p>
        Node.js가 HTML 파일을 보내고 있습니다.
    </p>

</body>
<script>
    const $input = document.querySelector("#input");
    const $button = document.querySelector("#button");
    const $chatBox = document.querySelector('.chat-box');

    function loadMessage(){
        $chatBox.innerHTML = '';

        fetch("http://localhost:3000")
        
        .then(messageArrayRes => messageArrayRes.json())
        .then(messagesArray => {
            messagesArray.forEach(element => {
                const $message = document.createElement('p');
                $message.textContent = element.name + " : " + element.text;
                $chatBox.appendChild($message);
            });
        });
    }

    function sendMessage(){
        let message = {
            name : '동건',
            text : $input.value
        };
        fetch("http://localhost:3000"
            ,
            {
                method : "POST",
                headers : {
                    "Content-Type":"application/json"
                },
                body : JSON.stringify(message)
            }
        )
        .then(()=>{
            $input.value = '';
            loadMessage();
        });
    }
    
    $button.onclick = sendMessage;

    loadMessage();

</script>

</html>
